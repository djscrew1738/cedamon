# Python CI — Runs agentic unit tests and orchestrator tests
#
# Agentic tests that do NOT require Docker, Neo4j, or external services
# can run directly in the GitHub Actions runner.

name: CI — Python

on:
  push:
    branches: [master, main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check agentic/ recon_orchestrator/ recon/ --output-format=github

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('agentic/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock
          pip install -r requirements.txt 2>/dev/null || true
      - name: Run heuristic engine tests
        run: python -m pytest tests/test_heuristics.py -v --tb=short
      - name: Run tool registry tests
        run: |
          python -m pytest tests/test_tool_registry_consistency.py -v --tb=short
          python -m pytest tests/test_tool_registry_completeness.py -v --tb=short
      - name: Run error class tests
        run: python -m pytest tests/test_error_class.py -v --tb=short

  orchestrator-tests:
    name: Orchestrator Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recon_orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock
          pip install -r requirements.txt
      - name: Run container manager tests
        run: python -m pytest tests/ -v --tb=short
